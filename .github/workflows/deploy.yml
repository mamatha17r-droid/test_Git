name: "Deploy to Databricks"
on:
  push:
    branches:
      - main  # This triggers the script every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Sync Code to Databricks
        run: |
          databricks repos update --path /Workspace/Repos/mrasamall@phs.org/test_Git --branch main
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
